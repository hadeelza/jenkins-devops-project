<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UQU DevOps Automation Project</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 40px;
            text-align: center;
        }
        .card {
            background: white;
            max-width: 600px;
            margin: 40px auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-top: 8px solid #8C1D40;
        }
        h1 {
            color: #8C1D40;
            margin-bottom: 15px;
            font-size: 26px;
        }
        p {
            color: #64748b;
            font-size: 16px;
            line-height: 1.6;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            background-color: #10b981;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 15px;
            font-size: 14px;
        }
        .version {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 25px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>UQU Automated Deployment System</h1>
        <p>This enterprise web application was automatically fetched, tested, compiled, and deployed using a structured Jenkins CI/CD pipeline and Docker containers.</p>
        <div class="status-badge">SYSTEM STATUS: LIVE</div>
        <div class="version">Build Version: v1.0.0</div>
    </div>
</body>
</html>
